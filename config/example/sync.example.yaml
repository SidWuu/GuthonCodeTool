# 同步对象、子系统别名、周期和本地目录模板。
sync:
  ACTIVE: products.demo-product
  interval_seconds: 600
  lookback_minutes: 10
  readonly_source_dir: var/source/readonly
  work_copy_dir: var/source/workcopy
  generated_doc_dir: var/knowledge
  # 每个 ACTIVE 自动使用 index_dir/{products|projects}/<id>.db。
  index_dir: var/runtime/index

systems:
  include:
    # 只维护别名；系统和数据源信息从各自数据库查询并自动缓存。
    system_aliases:
      - demo.system

rules:
  require_check_in_date: true
  allow_unchecked_check_out_user_ids:
    - U00000XXXX
  prefer_version_mac: true
  skip_error_source: true
