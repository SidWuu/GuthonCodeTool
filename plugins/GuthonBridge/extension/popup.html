<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Guthon Bridge</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        width: 320px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1e293b;
        background: #f8fafc;
      }
      .wrap {
        display: grid;
        gap: 10px;
      }
      .title {
        font-size: 16px;
        font-weight: 700;
      }
      label {
        display: grid;
        gap: 4px;
        font-size: 12px;
        color: #475569;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
      }
      input[readonly] {
        color: #0f172a;
        background: #f1f5f9;
        cursor: default;
      }
      .actions {
        display: grid;
        gap: 8px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 9px 10px;
        cursor: pointer;
        color: white;
        background: #0f766e;
      }
      #status {
        white-space: pre-wrap;
        word-break: break-all;
        overflow-wrap: anywhere;
        font-size: 12px;
        color: #0f172a;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        min-height: 72px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">Guthon Bridge</div>

      <label>
        包名
        <input id="procedureKeyword" value="" readonly />
      </label>

      <label>
        函数名
        <input id="funId" value="" readonly />
      </label>

      <label>
        保存目录
        <input id="outputDir" value="" placeholder="/absolute/path/to/work-copy" />
      </label>

      <div class="actions">
        <button id="pullBtn">拉取到本地</button>
      </div>

      <div id="status">准备就绪</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
