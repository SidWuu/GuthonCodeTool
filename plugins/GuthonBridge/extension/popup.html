<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Guthon Bridge</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 336px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1e293b;
        background: #f4f7fb;
      }
      .wrap {
        display: grid;
        gap: 12px;
      }
      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .title {
        font-size: 17px;
        font-weight: 700;
      }
      label {
        display: grid;
        gap: 4px;
        font-size: 12px;
        color: #475569;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
      }
      input[readonly] {
        color: #0f172a;
        background: #f1f5f9;
        cursor: default;
      }
      .actions {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .source-actions {
        display: grid;
        grid-column: 1 / -1;
        grid-template-columns: 3fr 1fr;
        gap: 8px;
      }
      .source-actions.full-width {
        grid-template-columns: 1fr;
      }
      button {
        min-height: 34px;
        border: 1px solid #409eff;
        border-radius: 4px;
        padding: 8px 10px;
        cursor: pointer;
        color: white;
        background: #409eff;
        font-weight: 600;
      }
      button:hover {
        background: #66b1ff;
        border-color: #66b1ff;
      }
      #pullPageBtn {
        grid-column: 1 / -1;
      }
      .action-force {
        min-height: 28px;
        padding: 5px 8px;
        border-color: #e6a23c;
        color: #e6a23c;
        background: #fdf6ec;
        font-size: 12px;
        font-weight: 500;
      }
      .action-force:hover {
        border-color: #e6a23c;
        color: #fff;
        background: #e6a23c;
      }
      #closeBtn {
        width: 28px;
        height: 28px;
        padding: 0;
        border: 0;
        color: #475569;
        background: transparent;
        font-size: 18px;
        line-height: 28px;
      }
      #status {
        white-space: pre-wrap;
        word-break: break-all;
        overflow-wrap: anywhere;
        font-size: 12px;
        color: #0f172a;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        min-height: 72px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div class="title">Guthon Bridge</div>
        <button id="closeBtn" title="关闭" type="button">×</button>
      </div>

      <label>
        <span id="procedureLabel">包名</span>
        <input id="procedureKeyword" value="" readonly />
      </label>

      <label>
        <span id="funIdLabel">函数名</span>
        <input id="funId" value="" readonly />
      </label>

      <label>
        页面保存目录
        <input id="outputDir" value="" placeholder="/absolute/path/to/work-copy" />
      </label>

      <div class="actions">
        <button id="pullPageBtn">拉取页面当前源码</button>
        <div class="source-actions">
          <button id="pullHubBtn">拉取源码表版本</button>
          <button id="forceRefreshBtn" class="action-force">强制刷新</button>
        </div>
        <button id="copyFieldsBtn">复制字段</button>
        <button id="pasteFieldsBtn">粘贴字段</button>
      </div>

      <div id="status">准备就绪</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
